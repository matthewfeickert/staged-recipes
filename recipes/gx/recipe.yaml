schema_version: 1

# Upstream has no tagged releases or version numbers. We pin to the latest
# commit on the 'gx' branch as of 2025-03-04 and encode that date in the
# version string so future updates can be ordered.

context:
  version: "0.0.0.20250304"
  commit: "bc2fe5523c23e3d0198181a3e3b7c8a482e25ba5"

recipe:
  name: gx-suite
  version: ${{ version }}

source:
  git: https://bitbucket.org/gyrokinetics/gx.git
  rev: ${{ commit }}

build:
  number: 0
  variant:
    # Default to MPICH over other variants
    down_prioritize_variant: ${{ 0 if mpi == "mpich" else 1 }}
  skip:
    - not linux
    - match(cuda_compiler_version, "==None")

outputs:
  - package:
      name: gx-core
    build:
      # Example: cuda129_mpi_mpich_h<hash>_<build_number>
      string: cuda${{ cuda_compiler_version | version_to_buildstring }}_mpi_${{ mpi }}_h${{ hash }}_${{ build_number }}
      script: build.sh
    requirements:
      run_exports:
        - ${{ pin_subpackage("gx-core", upper_bound="x.x") }}
      build:
        - ${{ stdlib("c") }}
        - ${{ compiler("cxx") }}
        - ${{ compiler("cuda") }}
        - if: linux and aarch64
          then: arm-variant * ${{ arm_variant_type }}
        - make
      host:
        - cuda-version ${{ cuda_compiler_version }}.*
        - cuda-cudart-dev
        - cuda-cudart-static
        - cuda-nvtx-dev
        - libcublas-dev
        - libcufft-dev
        - libcufft-static
        - libcusolver-dev
        - cutensor
        - nccl
        - gsl
        # Repeat of requirements with no constraint and with build variant are to
        # pick up global pinning (from no constraint)
        - hdf5
        - hdf5 [build=mpi_${{ mpi }}_*]
        - libnetcdf
        - libnetcdf [build=mpi_${{ mpi }}_*]
        - netcdf-fortran [build=mpi_${{ mpi }}_*]
        - ${{ mpi }}
      run:
        - ${{ pin_compatible("cuda-version", lower_bound="x", upper_bound="x") }}
        - gsl
        - hdf5 * [build=mpi_${{ mpi }}_*]
        - libnetcdf * [build=mpi_${{ mpi }}_*]
        - netcdf-fortran * [build=mpi_${{ mpi }}_*]
        - ${{ mpi }}
    tests:
      - package_contents:
          strict: true
          bin:
            - gx
          files:
            # The binary embeds GX_PATH=$PREFIX/share/gx and resolves helper
            # scripts beneath it
            - share/gx/geometry_modules/*
      # Linkage test: verify every NEEDED library resolves on a GPU-less host.
      # gx itself cannot be executed without a real CUDA driver (main.cu calls
      # cudaGetDeviceCount before argv parsing, so even the wrong-args path
      # touches the driver), but ldd resolution against the cuda-driver-dev
      # stub still catches RPATH bugs, missing run-deps, and broken MPI variant
      # linkage. cuda-driver-dev places the stub in $PREFIX/lib/stubs/ so it
      # cannot shadow the real driver at runtime on a GPU host; for the
      # throwaway test env we symlink it into $PREFIX/lib/ as libcuda.so.1.
      - script:
          # cuda-driver-dev ships its libcuda.so stub at $PREFIX/lib/stubs/ so it
          # cannot shadow the real driver at runtime on a GPU host. Symlink it
          # into $PREFIX/lib/libcuda.so.1 in this throwaway test env and assert
          # the resolved path exists. test -f follows the symlink chain, so a
          # dangling link (e.g. if the cuda-driver-dev stub layout changed)
          # fails this step.
          - ln -s ${PREFIX}/lib/stubs/libcuda.so ${PREFIX}/lib/libcuda.so.1
          - test -f ${PREFIX}/lib/libcuda.so.1
          # ldd only walks DT_NEEDED entries, so it does not reflect cudart's
          # runtime dlopen("libcuda.so.1") — that is what the symlink+test -f
          # above guards. The ldd assertion still catches RPATH bugs, missing
          # run-deps, and broken MPI-variant linkage.
          - ldd ${PREFIX}/bin/gx
          # '!' negates/inverts the exit code
          - "! ldd ${PREFIX}/bin/gx | grep -q 'not found'"
        requirements:
          run:
            - cuda-driver-dev

  # Convenience metapackage: gx-core plus a Python interpreter so the
  # geometry helper scripts under share/gx/geometry_modules/ (invoked by
  # the gx binary at runtime, e.g. for Miller geometry) can be run.
  # gx_geo.py imports numpy, scipy, toml, and (optionally) netCDF4; these
  # are not pulled in here per the requested minimal layout, so users who
  # need Miller geometry should install them alongside.
  - package:
      name: gx
    build:
      noarch: generic
      # Metapackage: no build payload, do nothing.
      script: "true"
    requirements:
      host:
        - python
      run:
        # exact=true ties this metapackage to the matching MPI/CUDA build of
        # gx-core, so installing gx pulls in the binary that was built in
        # the same variant.
        - ${{ pin_subpackage("gx-core", exact=true) }}
        - python
        - numpy
        - scipy
        - matplotlib-base
        - netcdf4
        - if: match(python, "<3.11")
          then: tomli

    tests:
      - script:
          - which gx
          - python --version

  - package:
      name: gx-${{ mpi }}
    build:
      noarch: generic
      # Avoid inheriting built script and do nothing instead
      script: "true"
    requirements:
      run:
        # Pin to the exact build variant of the gx metapackage; that
        # transitively pulls in gx-core (the binary) and python.
        - ${{ pin_subpackage("gx", exact=true) }}
    tests:
      - script:
          - which gx

about:
  homepage: https://bitbucket.org/gyrokinetics/gx/
  summary: GPU-native gyrokinetic turbulence solver
  description: |
    GX is a code for solving the nonlinear gyrokinetic system for low-frequency
    turbulence in magnetized plasmas using Fourier-Hermite-Laguerre spectral
    methods. A unique feature of GX is the use of a Hermite-Laguerre velocity
    discretization, which allows GX to smoothly interpolate between coarse
    gyrofluid-like resolutions and finer conventional gyrokinetic resolutions.
    GX is GPU-native and is designed and optimized for NVIDIA GPUs in CUDA/C++.
  license: MIT
  license_file: docs/License.rst
  documentation: https://gx.readthedocs.io/
  repository: https://bitbucket.org/gyrokinetics/gx/

extra:
  feedstock-name: gx
  recipe-maintainers:
    - matthewfeickert
